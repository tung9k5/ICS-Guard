services:
  # 1. Frontend Dashboard (ReactJS)
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
      - VITE_GOOGLE_GSI_CLIENT_URL=${VITE_GOOGLE_GSI_CLIENT_URL}
      - VITE_API_URL=${VITE_API_URL}
      - VITE_USE_OPENAI=${VITE_USE_OPENAI}
      - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_PROXY_TARGET=${VITE_PROXY_TARGET}
    depends_on:
      - backend
    restart: always

  # 2. Backend API (FastAPI / NestJS)
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    command: sh -c "cd /ai-services && npm install && cd /app && npm start"
    volumes:
      - ./backend:/app
      - ./ai-services:/ai-services
      - /app/node_modules
    environment:
      - PORT=${BACKEND_PORT}
      - VITE_USE_OPENAI=${VITE_USE_OPENAI}
      - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-123456}@mongodb:27017/${MONGO_DB}?authSource=admin
      - MONGO_DB=${MONGO_DB}
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      - INFLUXDB_URL=http://influxdb:8086
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-$VITE_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - GOOGLE_OAUTH_AUTH_URL=${GOOGLE_OAUTH_AUTH_URL}
      - GOOGLE_OAUTH_TOKEN_URL=${GOOGLE_OAUTH_TOKEN_URL}
      - GOOGLE_OAUTH_USERINFO_URL=${GOOGLE_OAUTH_USERINFO_URL}
      - GOOGLE_OAUTH_TOKENINFO_URL=${GOOGLE_OAUTH_TOKENINFO_URL}
      - MQTT_URL=mqtt://mosquitto:${MQTT_PORT:-1883}
      - MQTT_TLS_PORT=${MQTT_TLS_PORT:-8883}
    depends_on:
      - mongodb
      - rabbitmq
      - influxdb
    restart: always

  # 3. MongoDB (Event DB - LĆ°u sá»± kiá»‡n, rule, incident)
  mongodb:
    image: mongo:6-jammy
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  # 4. InfluxDB (Time-series DB - LĆ°u telemetry tá»« thiáşżt bá»‹)
  influxdb:
    image: influxdb:1.8-alpine
    environment:
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - INFLUXDB_DB=${INFLUXDB_DB}
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    restart: always

  # 5. Mosquitto (MQTT Protocol cho IoT)
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT}:${MQTT_PORT}"
      - "${MQTT_TLS_PORT}:${MQTT_TLS_PORT}"
    volumes:
      - ./backend/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: always

  # 6. RabbitMQ (Message Queue)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  # 7. Nginx (Firewall/Proxy)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always


volumes:
  mongodb_data:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:
  rabbitmq_data:
