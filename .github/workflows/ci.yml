name: ICS-Guard CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 1. Frontend CI (NodeJS / React)
  frontend-ci:
    name: Frontend CI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          if [ -f package.json ]; then
            npm ci || npm install
          else
            echo "No package.json found in frontend, skipping installation"
          fi

      - name: Run Linter
        run: |
          cd frontend
          if [ -f package.json ] && npm run | grep -q 'lint'; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run Tests
        run: |
          cd frontend
          if [ -f package.json ] && npm run | grep -q 'test'; then
            npm run test -- --watchAll=false --passWithNoTests
          else
            echo "No test script found, skipping"
          fi

  # 2. Backend CI (NestJS / Node.js)
  backend-ci:
    name: Backend CI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Node Backend Dependencies
        run: |
          cd backend
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: Run Node Backend Tests
        run: |
          cd backend
          if [ -f package.json ] && npm run | grep -q 'test'; then
            npm run test
          fi

  # 3. IoT Simulator CI (Python)
  iot-simulator-ci:
    name: IoT Simulator CI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Check Python Syntax & Lint
        run: |
          # Kiểm tra biên dịch cú pháp Python
          python -m compileall iot/
          # Chạy flake8 kiểm tra lỗi cú pháp và lỗi logic nghiêm trọng
          flake8 iot/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # 4. Docker Compose & Environment Validation
  docker-validation:
    name: Docker Stack Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup environment file
        run: cp .env.example .env

      - name: Verify Docker Compose Config
        run: docker compose config

      - name: Build Docker Stack
        run: docker compose build
